name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests
      - run: oask run examples/traces/safe_verified_build.json --max-score 0
      - run: oask run examples/traces/unsafe_false_success.json || test $? -eq 1
